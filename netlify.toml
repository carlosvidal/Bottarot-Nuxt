[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Netlify preset for Nitro (SSG → CDN, SSR → Functions)
  NITRO_PRESET = "netlify"
  # 4GB heap needed for prerendering 1,500+ blog articles
  NODE_OPTIONS = "--max-old-space-size=4096"

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = false

# Edge function: strip trailing slashes with 301 redirect.
# Runs at CDN edge BEFORE static files, catching prerendered pages
# that Netlify serves at both /path and /path/.
[[edge_functions]]
  function = "trailing-slash"
  path = "/*"
